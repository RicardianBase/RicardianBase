name: ricardian-api

services:
  - name: api
    github:
      repo: RicardianBase/RicardianBase
      branch: main
      deploy_on_push: true
    source_dir: ricardian-api
    build_command: npm ci && npm run build
    run_command: node dist/src/main.js
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
      initial_delay_seconds: 15
      period_seconds: 30
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: CORS_ORIGIN
        scope: RUN_TIME
        value: https://www.ricardianbase.com,https://ricardianbase.com
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: PORT
        scope: RUN_TIME
        value: "3000"

databases:
  - engine: PG
    name: db
    version: "16"
    size: db-s-1vcpu-1gb

jobs:
  - name: migrate
    github:
      repo: RicardianBase/RicardianBase
      branch: main
    source_dir: ricardian-api
    build_command: npm ci && npm run build
    run_command: npm run migration:run:prod
    kind: PRE_DEPLOY
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
