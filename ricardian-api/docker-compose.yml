services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ricardian_dev
      POSTGRES_USER: ricardian
      POSTGRES_PASSWORD: ricardian_local
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ricardian.dev
      PGADMIN_DEFAULT_PASSWORD: admin

volumes:
  pgdata:
